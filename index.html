<canvas id="game"></canvas>
<script>
// ============================================================
//  走れ！トゥントゥントゥンサフール
//  横スクロール算数ランナーゲーム
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Polyfill for roundRect (Safari/older browsers)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    if (!Array.isArray(radii)) radii = [radii, radii, radii, radii];
    const [tl, tr, br, bl] = radii.map(r => typeof r === 'number' ? r : 0);
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
  };
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Constants ---
const GROUND_RATIO = 0.72;
const CHAR_WIDTH = 70;
const CHAR_HEIGHT = 100;
const GRAVITY = 0.65;
const JUMP_FORCE = -18;
const SCROLL_SPEED_BASE = 6;
const PLATFORM_LEN = 500;     // 上ルートの長さ（world 座標）
const PLATFORM_HEIGHT = 150;  // 地面から上ルート上面までの高さ
const EVOLUTION_TURBO_COUNT = 5; // 進化に必要なターボ取得数
const SLOW_TRIGGER_DIST = 400;   // 進化後スローを発動する分岐までの距離

// --- Game State ---
let state = 'title'; // title, select, running, result, gameover, ranking
let score = 0;
let level = 1;
let scrollSpeed = SCROLL_SPEED_BASE;
let bgOffset = 0;
let groundOffset = 0;
let question = null;
let worldX = 0;
let animTimer = 0;
let gameOverType = '';
let gameOverTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let comboCount = 0;
let correctEffectTimer = 0;
let particles = [];
let runFrame = 0;

// Turbo item
let turboItemWorldX = 0;   // world X position of the turbo item
let turboItemActive = false; // is turbo item on screen?
let turboItemCollected = false; // was it collected?
let turboBoost = false;     // next question gets +3 level boost
let turboEffectTimer = 0;   // visual effect timer
let turboCount = 0;         // 取得した累計ターボ数（進化判定用）

// Evolution
let evolved = false;
let evolutionTimer = 0;     // 進化演出タイマー（60→0）

// Character
let charX = 0;
let charY = 0;
let charVY = 0;
let isOnGround = true;
let isFalling = false; // for game over fall animation

// Platform (上ルート)
let currentPlatform = null; // { x1, x2, topY } in world/screen coords. null = 存在しない
let onPlatform = false;     // 現在プラットフォーム上に乗っているか

// Branch system - positions are in WORLD coordinates
let branchWorldX = 0;      // world X where the branch judgment happens
let judged = false;         // has this branch been judged yet?
let resultTimer = 0;        // timer after judgment for animations
let resultCorrect = false;  // was the judgment correct?

// Character selection
let selectedCharacter = 'safool'; // デフォルト
let selectHoverIndex = 0;         // キャラ選択画面のフォーカス

// --- Ranking System (localStorage) ---
const RANKING_KEY = 'tuntuntun_ranking';
const RANKING_MAX = 5;

function loadRanking() {
  try {
    const raw = localStorage.getItem(RANKING_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return [];
}

function saveToRanking(lv, sc, charId) {
  const ranking = loadRanking();
  const charObj = CHARACTERS.find(c => c.id === charId);
  ranking.push({
    level: lv,
    score: sc,
    character: charId,
    name: charObj ? charObj.name : charId,
    date: new Date().toLocaleDateString('ja-JP'),
  });
  // レベル降順 → スコア降順でソートし上位5件だけ保持
  ranking.sort((a, b) => b.level - a.level || b.score - a.score);
  ranking.splice(RANKING_MAX);
  localStorage.setItem(RANKING_KEY, JSON.stringify(ranking));
  return ranking;
}

let lastRanking = [];   // ゲームオーバー時に保存した結果を保持
let lastRankIndex = -1; // 今回のランクインindex（-1 = ランク外）

// --- Character Image ---
let charImage = null;
let charImageLoaded = false;
const img = new Image();
img.onload = () => { charImage = img; charImageLoaded = true; };
img.src = 'character.png';

// --- Character Definitions (draw functions assigned after drawSafool etc. are declared) ---
const CHARACTERS = [
  {
    id: 'safool',
    name: 'トゥントゥントゥンサフール',
    subtitle: 'バランス型',
    baseSpeed: 6,
    growth: 0.3,
    speedCap: 13,
    themeColor: '#deb060',
    draw: null, // assigned later
  },
  {
    id: 'bombar',
    name: 'ボンバルディロ・クロコディロ',
    subtitle: '重量級・じわじわ加速',
    baseSpeed: 5,
    growth: 0.25,
    speedCap: 11,
    themeColor: '#3e7d4f',
    draw: null,
  },
  {
    id: 'tralala',
    name: 'トララレオ・トラララ',
    subtitle: '四足のサメ・高速型',
    baseSpeed: 7,
    growth: 0.35,
    speedCap: 14,
    themeColor: '#4a8dd8',
    draw: null,
  },
];

function getSelectedCharacter() {
  return CHARACTERS.find(c => c.id === selectedCharacter) || CHARACTERS[0];
}

// --- Speed Computation (単一ソース) ---
function computeSpeed() {
  const ch = getSelectedCharacter();
  return Math.min(ch.baseSpeed + level * ch.growth, ch.speedCap);
}

// --- Audio ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'jump') {
      osc.frequency.setValueAtTime(400, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    } else if (type === 'start') {
      osc.frequency.setValueAtTime(262, ctx.currentTime);
      osc.frequency.setValueAtTime(330, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(392, ctx.currentTime + 0.24);
      osc.frequency.setValueAtTime(523, ctx.currentTime + 0.36);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    }
  } catch (e) {}
}

// --- Math Problem Generator ---
function generateQuestion() {
  let a, b, op, answer;
  if (level <= 3) {
    a = Math.floor(Math.random() * 9) + 1;
    b = Math.floor(Math.random() * 9) + 1;
    op = '+'; answer = a + b;
  } else if (level <= 6) {
    a = Math.floor(Math.random() * 9) + 2;
    b = Math.floor(Math.random() * (a - 1)) + 1;
    op = '-'; answer = a - b;
  } else if (level <= 9) {
    if (Math.random() < 0.5) {
      a = Math.floor(Math.random() * 20) + 10;
      b = Math.floor(Math.random() * 10) + 1;
      op = '+'; answer = a + b;
    } else {
      a = Math.floor(Math.random() * 20) + 11;
      b = Math.floor(Math.random() * 10) + 1;
      if (b > a) [a, b] = [b, a];
      op = '-'; answer = a - b;
    }
  } else if (level <= 12) {
    a = Math.floor(Math.random() * 9) + 1;
    b = Math.floor(Math.random() * 9) + 1;
    op = '×'; answer = a * b;
  } else {
    const r = Math.random();
    if (r < 0.4) {
      b = Math.floor(Math.random() * 9) + 1;
      answer = Math.floor(Math.random() * 9) + 1;
      a = b * answer; op = '÷';
    } else if (r < 0.7) {
      a = Math.floor(Math.random() * 9) + 1;
      b = Math.floor(Math.random() * 9) + 1;
      op = '×'; answer = a * b;
    } else {
      a = Math.floor(Math.random() * 30) + 10;
      b = Math.floor(Math.random() * 15) + 1;
      op = Math.random() < 0.5 ? '+' : '-';
      if (op === '-' && b > a) [a, b] = [b, a];
      answer = op === '+' ? a + b : a - b;
    }
  }
  let wrong;
  do {
    const offset = Math.floor(Math.random() * 5) + 1;
    wrong = Math.random() < 0.5 ? answer + offset : answer - offset;
    if (wrong < 0) wrong = answer + offset;
  } while (wrong === answer);

  const correctOnTop = Math.random() < 0.5;
  return {
    text: `${a} ${op} ${b} = ?`,
    answer, wrong,
    topAnswer: correctOnTop ? answer : wrong,
    bottomAnswer: correctOnTop ? wrong : answer,
    correctIsJump: correctOnTop
  };
}

// --- Particles ---
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 6,
      life: 1, color,
      size: Math.random() * 6 + 2
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Drawing: Character Dispatcher ---
// selectedCharacter に応じたキャラ固有の draw を呼び出し、必要なら進化オーラを重ねる。
// overrideId を指定するとキャラ選択画面などで特定キャラを描ける。
function drawCharacter(x, y, w, h, frame, overrideId) {
  const id = overrideId || selectedCharacter;
  const ch = CHARACTERS.find(c => c.id === id) || CHARACTERS[0];

  // 進化オーラ（override 時は描かない）
  if (!overrideId && evolved) {
    const pulse = Math.sin(frame * 0.15) * 6;
    const rx = w * 0.55 + pulse;
    const ry = h * 0.55 + pulse;
    const cy = y - h * 0.5;
    ctx.save();
    const grad = ctx.createRadialGradient(x, cy, 5, x, cy, Math.max(rx, ry));
    grad.addColorStop(0, 'rgba(255, 230, 120, 0.45)');
    grad.addColorStop(0.6, 'rgba(255, 180, 80, 0.2)');
    grad.addColorStop(1, 'rgba(255, 140, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 進化演出（最初の60フレーム光る拡大リング）
  if (!overrideId && evolutionTimer > 0) {
    const t = 1 - evolutionTimer / 60;
    ctx.save();
    ctx.globalAlpha = (1 - t);
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(x, y - h * 0.5, 30 + t * 120, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  if (ch.draw) {
    ch.draw(x, y, w, h, frame);
  } else {
    drawSafool(x, y, w, h, frame);
  }
}

// --- Drawing: Safool (original, default character) ---
function drawSafool(x, y, w, h, frame) {
  if (charImageLoaded && selectedCharacter === 'safool') {
    ctx.drawImage(charImage, x - w/2, y - h, w, h);
    return;
  }
  const cx = x;
  const bottom = y;
  const bodyW = w * 0.5;
  const bodyH = h * 0.6;
  const headH = h * 0.35;
  const headW = bodyW * 0.9;
  const legLen = h * 0.32;

  // Legs
  const legSwing = Math.sin(frame * 0.3) * 15;
  ctx.strokeStyle = '#c8943e'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 8, bottom - legLen); ctx.lineTo(cx - 8 + legSwing, bottom); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 8, bottom - legLen); ctx.lineTo(cx + 8 - legSwing, bottom); ctx.stroke();
  ctx.fillStyle = '#b8843a';
  ctx.beginPath(); ctx.ellipse(cx - 8 + legSwing, bottom, 8, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 8 - legSwing, bottom, 8, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Body
  const bodyTop = bottom - legLen - bodyH;
  const grad = ctx.createLinearGradient(cx - bodyW/2, bodyTop, cx + bodyW/2, bodyTop);
  grad.addColorStop(0, '#c8943e'); grad.addColorStop(0.3, '#deb060');
  grad.addColorStop(0.7, '#deb060'); grad.addColorStop(1, '#b8843a');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(cx - bodyW/2, bodyTop, bodyW, bodyH, [bodyW/4, bodyW/4, 4, 4]); ctx.fill();

  // Arms
  const armSwing = Math.sin(frame * 0.3 + Math.PI) * 12;
  ctx.strokeStyle = '#c8943e'; ctx.lineWidth = 5;
  // Left arm (free arm - longer)
  ctx.beginPath(); ctx.moveTo(cx - bodyW/2, bodyTop + bodyH * 0.3); ctx.lineTo(cx - bodyW/2 - 20, bodyTop + bodyH * 0.7 + armSwing); ctx.stroke();
  // Right arm (holding club) - hand at shoulder height
  const clubArmX = cx + bodyW/2;
  const clubArmY = bodyTop + bodyH * 0.3;
  const clubHandX = clubArmX + 20;
  const clubHandY = clubArmY + 14 - armSwing * 0.3;
  ctx.beginPath(); ctx.moveTo(clubArmX, clubArmY); ctx.lineTo(clubHandX, clubHandY); ctx.stroke();

  // Club (棍棒) - held up, resting on shoulder
  const clubSwing = Math.sin(frame * 0.3) * 3;
  // Club goes from hand upward and back over shoulder
  const clubTipX = clubHandX - 15 + clubSwing;
  const clubTipY = clubHandY - 40;
  // Shaft
  ctx.strokeStyle = '#6B4226'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(clubHandX, clubHandY); ctx.lineTo(clubTipX, clubTipY); ctx.stroke();
  // Club head (thicker bulge at top)
  ctx.strokeStyle = '#5A3520'; ctx.lineWidth = 11;
  ctx.beginPath(); ctx.moveTo(clubTipX, clubTipY); ctx.lineTo(clubTipX - 3, clubTipY - 12); ctx.stroke();
  ctx.strokeStyle = '#6B4226'; ctx.lineWidth = 9;
  ctx.beginPath(); ctx.moveTo(clubTipX - 1, clubTipY - 2); ctx.lineTo(clubTipX - 3, clubTipY - 10); ctx.stroke();
  // Highlight
  ctx.strokeStyle = '#8B6240'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(clubHandX - 1, clubHandY - 3); ctx.lineTo(clubTipX + 2, clubTipY + 3); ctx.stroke();

  // Head (四角い形 - 角ばった頭)
  const headTop = bodyTop - headH + 5;
  const headGrad = ctx.createLinearGradient(cx - headW/2, headTop, cx + headW/2, headTop);
  headGrad.addColorStop(0, '#d4a44e'); headGrad.addColorStop(0.3, '#e8c070');
  headGrad.addColorStop(0.7, '#e8c070'); headGrad.addColorStop(1, '#c49440');
  ctx.fillStyle = headGrad;
  ctx.beginPath(); ctx.roundRect(cx - headW/2, headTop, headW, headH, [4, 4, 4, 4]); ctx.fill();

  // Eyes (大きめ)
  const eyeY = headTop + headH * 0.42;
  const eyeSpacing = headW * 0.28;
  // White part (大きく)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(cx - eyeSpacing, eyeY, 11, 12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + eyeSpacing, eyeY, 11, 12, 0, 0, Math.PI * 2); ctx.fill();
  // Eye outline
  ctx.strokeStyle = '#3a2a10'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(cx - eyeSpacing, eyeY, 11, 12, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + eyeSpacing, eyeY, 11, 12, 0, 0, Math.PI * 2); ctx.stroke();
  // Pupils (大きく)
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(cx - eyeSpacing + 2, eyeY + 1, 7, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + eyeSpacing + 2, eyeY + 1, 7, 8, 0, 0, Math.PI * 2); ctx.fill();
  // Pupil highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(cx - eyeSpacing + 5, eyeY - 3, 2.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + eyeSpacing + 5, eyeY - 3, 2.5, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  // Eyebrows
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx - eyeSpacing - 9, eyeY - 15); ctx.lineTo(cx - eyeSpacing + 9, eyeY - 17); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + eyeSpacing - 9, eyeY - 17); ctx.lineTo(cx + eyeSpacing + 9, eyeY - 15); ctx.stroke();

  // Nose (高め - 突き出た鼻)
  ctx.fillStyle = '#c49440';
  ctx.beginPath();
  ctx.moveTo(cx, eyeY + 4);
  ctx.lineTo(cx + 5, eyeY + 12);
  ctx.lineTo(cx - 3, eyeY + 12);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#a07830'; ctx.lineWidth = 1;
  ctx.stroke();

  // Mouth (wide grin)
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(cx, eyeY + 18, 11, 0.05 * Math.PI, 0.95 * Math.PI); ctx.stroke();
  // Teeth hint
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx - 8, eyeY + 20); ctx.lineTo(cx + 8, eyeY + 20); ctx.stroke();
}

// --- Drawing: Bombar (ボンバルディロ・クロコディロ: ワニ＋爆撃機) ---
function drawBombar(x, y, w, h, frame) {
  const cx = x;
  const bottom = y;
  const bodyW = w * 0.6;
  const bodyH = h * 0.55;
  const legLen = h * 0.22; // 短め（重量級）

  // Legs (ワニ足・短太)
  const legSwing = Math.sin(frame * 0.25) * 10;
  ctx.strokeStyle = '#2e6b3f'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 10, bottom - legLen); ctx.lineTo(cx - 10 + legSwing, bottom); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 10, bottom - legLen); ctx.lineTo(cx + 10 - legSwing, bottom); ctx.stroke();
  ctx.fillStyle = '#1f4f2e';
  ctx.beginPath(); ctx.ellipse(cx - 10 + legSwing, bottom, 11, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 10 - legSwing, bottom, 11, 5, 0, 0, Math.PI * 2); ctx.fill();

  // Body (爆撃機の機体 = 銀色)
  const bodyTop = bottom - legLen - bodyH;
  const bodyGrad = ctx.createLinearGradient(cx - bodyW/2, bodyTop, cx + bodyW/2, bodyTop);
  bodyGrad.addColorStop(0, '#8a9aa5'); bodyGrad.addColorStop(0.5, '#c8d2d8'); bodyGrad.addColorStop(1, '#8a9aa5');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(cx - bodyW/2, bodyTop, bodyW, bodyH, [bodyW/3, bodyW/3, 6, 6]);
  ctx.fill();
  ctx.strokeStyle = '#556066'; ctx.lineWidth = 1.5; ctx.stroke();

  // Wings (機体横の翼)
  ctx.fillStyle = '#7a8a95';
  ctx.beginPath();
  ctx.moveTo(cx - bodyW/2, bodyTop + bodyH * 0.4);
  ctx.lineTo(cx - bodyW/2 - 22, bodyTop + bodyH * 0.55);
  ctx.lineTo(cx - bodyW/2 - 18, bodyTop + bodyH * 0.7);
  ctx.lineTo(cx - bodyW/2, bodyTop + bodyH * 0.6);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx + bodyW/2, bodyTop + bodyH * 0.4);
  ctx.lineTo(cx + bodyW/2 + 22, bodyTop + bodyH * 0.55);
  ctx.lineTo(cx + bodyW/2 + 18, bodyTop + bodyH * 0.7);
  ctx.lineTo(cx + bodyW/2, bodyTop + bodyH * 0.6);
  ctx.closePath(); ctx.fill();

  // Bomb (body 下の爆弾)
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(cx, bodyTop + bodyH - 4, bodyW * 0.18, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(cx, bodyTop + bodyH - 4, 3, 0, Math.PI * 2); ctx.fill();

  // Head (ワニの頭 - 細長)
  const headW = bodyW * 1.1;
  const headH = h * 0.28;
  const headTop = bodyTop - headH + 5;
  const headGrad = ctx.createLinearGradient(cx - headW/2, headTop, cx + headW/2, headTop);
  headGrad.addColorStop(0, '#2e6b3f'); headGrad.addColorStop(0.5, '#4a8a55'); headGrad.addColorStop(1, '#2e6b3f');
  ctx.fillStyle = headGrad;
  // 頭 = 丸い後頭部
  ctx.beginPath();
  ctx.roundRect(cx - headW/2, headTop, headW * 0.7, headH, [headH/3, 4, 4, headH/3]);
  ctx.fill();
  // Snout (口吻 - 右に伸びる)
  ctx.fillStyle = '#4a8a55';
  ctx.beginPath();
  ctx.roundRect(cx + headW * 0.2 - headW/2, headTop + headH * 0.3, headW * 0.55, headH * 0.6, [4, 8, 8, 4]);
  ctx.fill();
  ctx.strokeStyle = '#2e4f30'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Teeth (歯並び)
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 5; i++) {
    const tx = cx + headW * 0.22 + i * 8 - headW/2;
    ctx.beginPath();
    ctx.moveTo(tx, headTop + headH * 0.85);
    ctx.lineTo(tx + 3, headTop + headH * 0.95);
    ctx.lineTo(tx + 6, headTop + headH * 0.85);
    ctx.fill();
  }

  // Eye (片目強調 - ワニらしさ)
  const eyeX = cx - headW * 0.1;
  const eyeY = headTop + headH * 0.35;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 10, 11, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1f3e25'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 10, 11, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(eyeX + 1, eyeY + 1, 6, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(eyeX + 3, eyeY - 3, 2, 0, Math.PI * 2); ctx.fill();

  // Propeller (頭上のプロペラ - アニメ)
  const propAngle = frame * 0.8;
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, headTop - 4); ctx.lineTo(cx, headTop - 14); ctx.stroke();
  ctx.save();
  ctx.translate(cx, headTop - 16);
  ctx.rotate(propAngle);
  ctx.fillStyle = 'rgba(120,120,120,0.75)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(cx, headTop - 16, 3, 0, Math.PI * 2); ctx.fill();
}

// --- Drawing: Tralala (トラララ・トラララ: サメ＋スニーカー) ---
// --- Drawing: Tralareo Tralala (四足歩行のサメ + スニーカー) ---
function drawTralala(x, y, w, h, frame) {
  const cx = x;
  const bottom = y;
  const bodyW = w * 1.05;    // 横長ボディ
  const bodyH = h * 0.4;     // 魚雷型
  const legLen = h * 0.26;

  // ボディ中心（4本脚の上に横置き）
  const bodyCY = bottom - legLen - bodyH * 0.45;

  // 4 本脚（前2本・後2本）— 対角線ペアで交互に動く
  const swingA = Math.sin(frame * 0.35) * 14;
  const swingB = Math.sin(frame * 0.35 + Math.PI) * 14;
  const legSlots = [
    { bx: cx - bodyW * 0.34, swing: swingA },  // 後ろ左
    { bx: cx - bodyW * 0.12, swing: swingB },  // 後ろ右
    { bx: cx + bodyW * 0.10, swing: swingA },  // 前 左
    { bx: cx + bodyW * 0.30, swing: swingB },  // 前 右
  ];
  for (const leg of legSlots) {
    const legTopX = leg.bx;
    const legTopY = bodyCY + bodyH * 0.35;
    const legBotX = legTopX + leg.swing;
    const legBotY = bottom - 8;

    // 脚（サメと同じ青）
    ctx.strokeStyle = '#3a6fb8';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(legTopX, legTopY);
    ctx.lineTo(legBotX, legBotY);
    ctx.stroke();

    // スニーカー
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(legBotX - 12, legBotY, 22, 9, [10, 10, 3, 3]);
    ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.3; ctx.stroke();
    // ストライプ
    ctx.fillStyle = '#ff3366';
    ctx.fillRect(legBotX - 8, legBotY + 3, 14, 2.5);
    // ソール
    ctx.fillStyle = '#222';
    ctx.fillRect(legBotX - 12, legBotY + 7, 22, 3);
  }

  // 尾びれ（左端）
  ctx.fillStyle = '#2f5593';
  ctx.beginPath();
  ctx.moveTo(cx - bodyW * 0.45, bodyCY);
  ctx.lineTo(cx - bodyW * 0.65, bodyCY - bodyH * 0.55);
  ctx.lineTo(cx - bodyW * 0.52, bodyCY);
  ctx.lineTo(cx - bodyW * 0.65, bodyCY + bodyH * 0.55);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1.5; ctx.stroke();

  // 本体（横長サメ）
  const bodyGrad = ctx.createLinearGradient(cx, bodyCY - bodyH/2, cx, bodyCY + bodyH/2);
  bodyGrad.addColorStop(0, '#2f5593');
  bodyGrad.addColorStop(0.5, '#6aa3e0');
  bodyGrad.addColorStop(0.6, '#d8e6f5');  // 腹側は白っぽく
  bodyGrad.addColorStop(1, '#e8f0f8');
  ctx.fillStyle = bodyGrad;

  // 魚雷型（右に尖る）
  ctx.beginPath();
  const noseX = cx + bodyW * 0.5;
  const noseY = bodyCY + bodyH * 0.05;
  ctx.moveTo(cx - bodyW * 0.45, bodyCY - bodyH * 0.1);  // 尾側上
  ctx.quadraticCurveTo(cx - bodyW * 0.1, bodyCY - bodyH * 0.55, cx + bodyW * 0.25, bodyCY - bodyH * 0.48);
  ctx.quadraticCurveTo(cx + bodyW * 0.45, bodyCY - bodyH * 0.35, noseX, noseY);  // 鼻先
  ctx.quadraticCurveTo(cx + bodyW * 0.45, bodyCY + bodyH * 0.4, cx + bodyW * 0.25, bodyCY + bodyH * 0.48);
  ctx.quadraticCurveTo(cx - bodyW * 0.1, bodyCY + bodyH * 0.55, cx - bodyW * 0.45, bodyCY + bodyH * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1.8; ctx.stroke();

  // 背びれ
  ctx.fillStyle = '#2f5593';
  ctx.beginPath();
  ctx.moveTo(cx - bodyW * 0.1, bodyCY - bodyH * 0.5);
  ctx.lineTo(cx + bodyW * 0.02, bodyCY - bodyH * 0.5 - 18);
  ctx.lineTo(cx + bodyW * 0.15, bodyCY - bodyH * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1.5; ctx.stroke();

  // エラ
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1.2;
  for (let i = 0; i < 3; i++) {
    const gx = cx + bodyW * 0.1 + i * 4;
    ctx.beginPath();
    ctx.moveTo(gx, bodyCY - bodyH * 0.15);
    ctx.quadraticCurveTo(gx - 2, bodyCY, gx, bodyCY + bodyH * 0.15);
    ctx.stroke();
  }

  // 口 & ギザ歯（右側）
  const mouthStartX = cx + bodyW * 0.28;
  const mouthY = bodyCY + bodyH * 0.1;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(mouthStartX, mouthY);
  const toothCount = 5;
  for (let i = 0; i < toothCount; i++) {
    const tx = mouthStartX + i * 4.5;
    ctx.lineTo(tx + 2.25, mouthY + 7);
    ctx.lineTo(tx + 4.5, mouthY);
  }
  ctx.lineTo(mouthStartX + toothCount * 4.5, mouthY - 1);
  ctx.lineTo(mouthStartX, mouthY - 1);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1; ctx.stroke();

  // 目（前方右寄りに1つ）
  const eyeX = cx + bodyW * 0.3;
  const eyeY = bodyCY - bodyH * 0.2;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 9, 10, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#1e3a68'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 9, 10, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(eyeX + 1, eyeY + 1, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(eyeX + 2.5, eyeY - 2, 1.8, 0, Math.PI * 2); ctx.fill();

  // 鼻孔（小さな穴）
  ctx.fillStyle = '#1e3a68';
  ctx.beginPath(); ctx.arc(cx + bodyW * 0.42, bodyCY - bodyH * 0.05, 1.2, 0, Math.PI * 2); ctx.fill();

  // スピードライン（高速感：尾側から流れる）
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2;
  const lineOffset = (frame * 4) % 16;
  for (let i = 0; i < 3; i++) {
    const ly = bodyCY - bodyH * 0.2 + i * 10;
    ctx.beginPath();
    ctx.moveTo(cx - bodyW * 0.75 - lineOffset, ly);
    ctx.lineTo(cx - bodyW * 0.55 - lineOffset, ly);
    ctx.stroke();
  }
}

CHARACTERS[0].draw = drawSafool;
CHARACTERS[1].draw = drawBombar;
CHARACTERS[2].draw = drawTralala;

// --- Drawing: Background ---
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height * GROUND_RATIO);
  grad.addColorStop(0, '#87CEEB'); grad.addColorStop(1, '#E0F0FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height * GROUND_RATIO);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  const clouds = [
    { x: 200, y: 60, w: 120, h: 40 }, { x: 500, y: 100, w: 90, h: 30 },
    { x: 800, y: 50, w: 140, h: 45 }, { x: 1100, y: 80, w: 100, h: 35 },
    { x: 1400, y: 40, w: 110, h: 38 },
  ];
  for (const c of clouds) {
    const cx = ((c.x - bgOffset * 0.3) % (canvas.width + 300)) - 150;
    ctx.beginPath();
    ctx.ellipse(cx, c.y, c.w/2, c.h/2, 0, 0, Math.PI * 2);
    ctx.ellipse(cx - c.w * 0.25, c.y + 5, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + c.w * 0.25, c.y + 5, c.w * 0.35, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMountains() {
  const groundY = canvas.height * GROUND_RATIO;
  ctx.fillStyle = '#8fbc8f';
  const mts = [0, 300, 600, 900, 1200, 1500];
  for (const mx of mts) {
    const x = ((mx - bgOffset * 0.5) % (canvas.width + 400)) - 200;
    ctx.beginPath(); ctx.moveTo(x - 150, groundY); ctx.lineTo(x, groundY - 120); ctx.lineTo(x + 150, groundY); ctx.fill();
  }
  ctx.fillStyle = '#6a9b6a';
  for (const mx of mts) {
    const x = ((mx + 150 - bgOffset * 0.7) % (canvas.width + 400)) - 200;
    ctx.beginPath(); ctx.moveTo(x - 100, groundY); ctx.lineTo(x, groundY - 80); ctx.lineTo(x + 100, groundY); ctx.fill();
  }
}

function drawGround() {
  const groundY = canvas.height * GROUND_RATIO;
  const grad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
  grad.addColorStop(0, '#8B6914'); grad.addColorStop(0.05, '#6B4F12'); grad.addColorStop(1, '#4a3510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(0, groundY - 4, canvas.width, 8);
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const lx = ((i * 80 - groundOffset) % (canvas.width + 80)) - 40;
    ctx.beginPath(); ctx.moveTo(lx, groundY + 10); ctx.lineTo(lx + 30, groundY + 10); ctx.stroke();
  }
}

// --- World-to-Screen helper ---
function worldToScreen(wx) {
  return wx - worldX + charX;
}

// --- Drawing: Turbo Item ---
function drawTurboItem() {
  if (!turboItemActive || turboItemCollected) return;
  const sx = worldToScreen(turboItemWorldX);
  if (sx < -50 || sx > canvas.width + 50) return;
  const groundY = canvas.height * GROUND_RATIO;
  const iy = groundY - 140 + Math.sin(animTimer * 0.08) * 8; // high in the air

  // Glow
  ctx.fillStyle = 'rgba(255, 0, 255, 0.15)';
  ctx.beginPath(); ctx.arc(sx, iy, 28, 0, Math.PI * 2); ctx.fill();

  // Icon background (circle)
  const grad = ctx.createRadialGradient(sx, iy, 5, sx, iy, 20);
  grad.addColorStop(0, '#FF66FF'); grad.addColorStop(1, '#CC00CC');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(sx, iy, 18, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(sx, iy, 18, 0, Math.PI * 2); ctx.stroke();

  // Lightning bolt icon
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(sx - 4, iy - 12);
  ctx.lineTo(sx + 6, iy - 12);
  ctx.lineTo(sx + 1, iy - 2);
  ctx.lineTo(sx + 8, iy - 2);
  ctx.lineTo(sx - 3, iy + 13);
  ctx.lineTo(sx + 1, iy + 2);
  ctx.lineTo(sx - 6, iy + 2);
  ctx.closePath();
  ctx.fill();

  // Label
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('TURBO', sx, iy - 28);
}

function drawTurboEffect() {
  if (turboEffectTimer <= 0) return;
  const alpha = turboEffectTimer / 60;
  ctx.fillStyle = `rgba(200, 0, 255, ${alpha * 0.2})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = `rgba(255, 0, 255, ${alpha})`;
  ctx.font = `bold ${28 + (60 - turboEffectTimer) * 0.3}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('TURBO! レベル +3 !!', canvas.width/2, canvas.height/2 - 80);
}

// --- Drawing: Branch ---
function drawBranch() {
  if (!question) return;
  const groundY = canvas.height * GROUND_RATIO;

  // Layout: signs appear 250px before judgment, trap is 200px after judgment
  // Upper platform is long (500px) so player can clearly see the path
  const signOffset = 250;   // signs appear this far before judgment
  const trapOffset = 200;   // trap is this far after judgment
  const platformLen = 500;  // upper platform length

  const signScreenX = worldToScreen(branchWorldX - signOffset);
  const branchScreenX = worldToScreen(branchWorldX);
  const dangerScreenX = worldToScreen(branchWorldX + trapOffset);
  const platformEndX = worldToScreen(branchWorldX - 50 + platformLen);

  // Don't draw if entirely off screen
  if (signScreenX > canvas.width + 300 || platformEndX < -200) return;

  const topY = groundY - 150;

  // Draw the split path lines
  const splitStartScreenX = worldToScreen(branchWorldX - signOffset - 100);
  ctx.lineWidth = 3;

  // Upper path curve
  ctx.strokeStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(splitStartScreenX, groundY - 4);
  ctx.quadraticCurveTo(branchScreenX - 80, topY - 30, branchScreenX - 50, topY);
  ctx.lineTo(platformEndX, topY);
  ctx.stroke();

  // Upper platform (long!)
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(branchScreenX - 50, topY - 4, platformLen, 20);
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(branchScreenX - 50, topY - 8, platformLen, 8);

  // Lower path line
  ctx.strokeStyle = '#FF6347';
  ctx.beginPath();
  ctx.moveTo(splitStartScreenX, groundY - 4);
  ctx.lineTo(platformEndX, groundY - 4);
  ctx.stroke();

  // --- Answer Signs (placed well before judgment line) ---
  const signW = 85, signH = 58;

  // Top sign (jump answer)
  const topSignSX = worldToScreen(branchWorldX - signOffset);
  const topSignY = topY - 75;
  ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(topSignSX, topSignY, signW, signH, 12); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#B8860B'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▲ ジャンプ', topSignSX + signW/2, topSignY - 10);
  ctx.fillStyle = '#333'; ctx.font = 'bold 32px sans-serif';
  ctx.fillText(question.topAnswer, topSignSX + signW/2, topSignY + signH/2);

  // Bottom sign (straight answer)
  const botSignSX = worldToScreen(branchWorldX - signOffset);
  const botSignY = groundY - 80;
  ctx.fillStyle = '#FF6347'; ctx.strokeStyle = '#B22222'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(botSignSX, botSignY, signW, signH, 12); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#B22222'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▶ まっすぐ', botSignSX + signW/2, botSignY - 10);
  ctx.fillStyle = '#333'; ctx.font = 'bold 32px sans-serif';
  ctx.fillText(question.bottomAnswer, botSignSX + signW/2, botSignY + signH/2);

  // --- Danger on wrong path (only visible AFTER judgment, so player must calculate) ---
  if (judged && dangerScreenX < canvas.width + 100) {
    if (question.correctIsJump) {
      drawPit(dangerScreenX, groundY);
    } else {
      drawSpikes(dangerScreenX, topY - 8);
    }
  }

  // --- Judgment line indicator (subtle dotted line) ---
  const judgeLine = branchScreenX;
  if (judgeLine > -50 && judgeLine < canvas.width + 50) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 8]);
    ctx.beginPath();
    ctx.moveTo(judgeLine, topY - 90);
    ctx.lineTo(judgeLine, groundY + 10);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawPit(x, groundY) {
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(x - 40, groundY - 4);
  ctx.lineTo(x - 30, groundY + 60);
  ctx.lineTo(x + 30, groundY + 60);
  ctx.lineTo(x + 40, groundY - 4);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(x - 45, groundY - 8, 10, 8);
  ctx.fillRect(x + 35, groundY - 8, 10, 8);
}

function drawSpikes(x, y) {
  ctx.fillStyle = '#888'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const sx = x - 20 + i * 12;
    ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + 6, y - 25); ctx.lineTo(sx + 12, y); ctx.fill(); ctx.stroke();
  }
}

// --- Drawing: Question ---
function drawQuestion() {
  if (!question) return;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(canvas.width/2 - 160, 35, 320, 60, 15); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(canvas.width/2 - 160, 35, 320, 60, 15); ctx.stroke();
  ctx.fillStyle = '#FFF'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(question.text, canvas.width/2, 65);
}

// --- Drawing: UI ---
function drawScore() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(canvas.width - 160, 10, 150, 45, 10); ctx.fill();
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  ctx.fillText(`スコア: ${score}`, canvas.width - 20, 32);

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(canvas.width - 160, 60, 150, 35, 10); ctx.fill();
  ctx.fillStyle = '#90EE90'; ctx.font = 'bold 15px sans-serif';
  ctx.fillText(`レベル: ${level}`, canvas.width - 20, 78);

  // Turbo count / Evolved HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(canvas.width - 160, 100, 150, 35, 10); ctx.fill();
  if (evolved) {
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px sans-serif';
    ctx.fillText('✨ EVOLVED', canvas.width - 20, 118);
  } else {
    ctx.fillStyle = '#FF99FF'; ctx.font = 'bold 15px sans-serif';
    ctx.fillText(`✨ ${turboCount}/${EVOLUTION_TURBO_COUNT}`, canvas.width - 20, 118);
  }

  if (comboCount > 1) {
    ctx.fillStyle = '#FF6347'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${comboCount} コンボ！`, canvas.width/2, canvas.height * GROUND_RATIO - 160);
  }
}

// --- Drawing: Slow-effect vignette (進化後の分岐接近時) ---
function drawSlowEffect() {
  if (!evolved || !question || judged) return;
  const dist = branchWorldX - worldX;
  if (dist <= 0 || dist >= SLOW_TRIGGER_DIST) return;
  const strength = 1 - (dist / SLOW_TRIGGER_DIST); // 0..1
  // 青いビネット
  const grad = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, Math.min(canvas.width, canvas.height) * 0.3,
    canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
  );
  grad.addColorStop(0, 'rgba(100, 180, 255, 0)');
  grad.addColorStop(1, `rgba(60, 120, 220, ${0.45 * strength})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // SLOW ラベル
  ctx.fillStyle = `rgba(200, 230, 255, ${0.8 * strength})`;
  ctx.strokeStyle = `rgba(40, 90, 180, ${0.9 * strength})`;
  ctx.lineWidth = 3;
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeText('～ SLOW ～', canvas.width/2, 150);
  ctx.fillText('～ SLOW ～', canvas.width/2, 150);
}

// --- Drawing: Title ---
function drawTitle() {
  drawSky(); drawMountains(); drawGround();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';

function getSelectCardRects() {
  const n = CHARACTERS.length;
  const cardW = Math.min(canvas.width / (n + 1), 220);
  const cardH = cardW * 1.4;
  const gap = 20;
  const totalW = cardW * n + gap * (n - 1);
  const startX = (canvas.width - totalW) / 2;
  const y = canvas.height * 0.32;
  return CHARACTERS.map((c, i) => ({
    x: startX + i * (cardW + gap),
    y,
    w: cardW,
    h: cardH,
    char: c,
  }));
}

function drawSelect() {
  drawSky(); drawMountains(); drawGround();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#B8860B'; ctx.lineWidth = 3;
  ctx.font = 'bold 34px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeText('キャラクターを選ぼう', canvas.width/2, canvas.height * 0.15);
  ctx.fillText('キャラクターを選ぼう', canvas.width/2, canvas.height * 0.15);

  const rects = getSelectCardRects();
  for (const r of rects) {
    const isSelected = r.char.id === selectedCharacter;
    const pulse = isSelected ? Math.sin(animTimer * 0.08) * 4 : 0;

    // Card background
    ctx.fillStyle = isSelected ? 'rgba(255, 215, 0, 0.2)' : 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = isSelected ? '#FFD700' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = isSelected ? 5 : 2;
    ctx.beginPath();
    ctx.roundRect(r.x - pulse, r.y - pulse, r.w + pulse*2, r.h + pulse*2, 16);
    ctx.fill(); ctx.stroke();

    // Character preview
    const previewX = r.x + r.w / 2;
    const previewY = r.y + r.h * 0.58;
    const previewW = Math.min(r.w * 0.5, CHAR_WIDTH * 1.5);
    const previewH = previewW * (CHAR_HEIGHT / CHAR_WIDTH);
    drawCharacter(previewX, previewY, previewW, previewH, animTimer, r.char.id);

    // Name
    ctx.fillStyle = '#FFF'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const name = r.char.name;
    const nameY = r.y + r.h * 0.75;
    // Split long names
    const chars = [...name];
    if (chars.length > 14) {
      const half = Math.floor(chars.length / 2);
      let split = half;
      for (let k = half; k < chars.length; k++) {
        if (chars[k] === '・' || chars[k] === ' ') { split = k + 1; break; }
      }
      ctx.strokeText(name.slice(0, split), previewX, nameY - 9);
      ctx.fillText(name.slice(0, split), previewX, nameY - 9);
      ctx.strokeText(name.slice(split), previewX, nameY + 9);
      ctx.fillText(name.slice(split), previewX, nameY + 9);
    } else {
      ctx.strokeText(name, previewX, nameY);
      ctx.fillText(name, previewX, nameY);
    }

    // Subtitle
    ctx.fillStyle = r.char.themeColor; ctx.font = '13px sans-serif';
    ctx.fillText(r.char.subtitle, previewX, r.y + r.h * 0.87);

    // Speed stat bars
    const statY = r.y + r.h * 0.93;
    const barMaxW = r.w * 0.6;
    const capRatio = (r.char.speedCap - 8) / 8; // 8..16 を 0..1 にマップ
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(previewX - barMaxW/2, statY, barMaxW, 6);
    ctx.fillStyle = r.char.themeColor;
    ctx.fillRect(previewX - barMaxW/2, statY, barMaxW * capRatio, 6);
  }

  // Start button
  const btnW = 200, btnH = 55;
  const btnX = canvas.width/2 - btnW/2;
  const btnY = canvas.height * 0.88;
  const pulse = Math.sin(animTimer * 0.05) * 3;

  ctx.fillStyle = '#FFF'; ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('このキャラで走る！', canvas.width/2, btnY + btnH/2);
}

// --- Game Logic ---
function startGame() {
  state = 'running';
  score = 0; level = 1; comboCount = 0;
  scrollSpeed = computeSpeed();
  worldX = 0; bgOffset = 0; groundOffset = 0;
  charX = canvas.width * 0.2;
  charY = canvas.height * GROUND_RATIO;
  charVY = 0; isOnGround = true; isFalling = false;
  onPlatform = false; currentPlatform = null;
  particles = []; correctEffectTimer = 0;
  turboBoost = false; turboEffectTimer = 0;
  turboCount = 0; evolved = false; evolutionTimer = 0;
  setupNextBranch();
  playSound('start');
}

function setupNextBranch() {
  question = generateQuestion();
  branchWorldX = worldX + canvas.width * 2.0;
  judged = false;
  resultTimer = 0;
  // Spawn turbo item midway between current position and branch, high in the air
  turboItemWorldX = worldX + canvas.width * 1.0;
  turboItemActive = true;
  turboItemCollected = false;

  // 上ルートのプラットフォーム（当たり判定用）を world 座標で定義
  const groundY = canvas.height * GROUND_RATIO;
  currentPlatform = {
    x1: branchWorldX - 50,
    x2: branchWorldX - 50 + PLATFORM_LEN,
    topY: groundY - PLATFORM_HEIGHT,
  };
  // 前の分岐で上ルートに乗っていた場合は、新しいプラットフォームは遥か先なので即落下開始
  if (onPlatform) {
    isOnGround = false;
    charVY = 0;
    onPlatform = false;
  }
}

function doJump() {
  if (state !== 'running' && state !== 'result') return;
  if (!isOnGround) return; // no double jump
  charVY = JUMP_FORCE;
  isOnGround = false;
  playSound('jump');
}

// --- Core: Check if character reached the branch judgment point ---
function checkBranchJudgment() {
  if (judged || !question) return;

  // The character's world X position
  const charWorldX = worldX;

  // Has the character reached the judgment line?
  if (charWorldX >= branchWorldX) {
    judged = true;
    resultTimer = 0;

    // Determine: is the character in the air or on the ground?
    const groundY = canvas.height * GROUND_RATIO;
    const isInAir = charY < groundY - 20; // threshold: at least 20px above ground

    const isCorrect = isInAir === question.correctIsJump;

    if (isCorrect) {
      resultCorrect = true;
      score++;
      comboCount++;
      if (score % 2 === 0) {
        level++;
        scrollSpeed = computeSpeed();
      }
      correctEffectTimer = 40;
      spawnParticles(charX, charY - CHAR_HEIGHT/2, '#FFD700', 15);
      playSound('correct');
      state = 'result';
    } else {
      resultCorrect = false;
      comboCount = 0;
      gameOverType = isInAir ? 'spike' : 'pit';
      shakeTimer = 20;
      shakeIntensity = 8;
      playSound('wrong');
      state = 'result';

      if (gameOverType === 'pit') {
        isFalling = true;
      }
    }
  }
}

// --- Input ---
function handlePointer(px, py) {
  if (state === 'ranking') {
    const backBtn = getRankingBackBtnRect();
    if (px >= backBtn.x && px <= backBtn.x + backBtn.w && py >= backBtn.y && py <= backBtn.y + backBtn.h) {
      state = 'title';
    }
    return;
  }
  if (state === 'title') {
    // ランキングボタン判定
    const rkBtn = getTitleRankingBtnRect();
    if (px >= rkBtn.x && px <= rkBtn.x + rkBtn.w && py >= rkBtn.y && py <= rkBtn.y + rkBtn.h) {
      state = 'ranking';
      return;
    }
    state = 'select';
    return;
  }
  if (state === 'select') {
    // キャラカードのヒット判定
    const rects = getSelectCardRects();
    for (const r of rects) {
      if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) {
        selectedCharacter = r.char.id;
        return;
      }
    }
    // スタートボタン
    const btn = getStartButtonRect();
    if (px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h) {
      startGame();
      return;
    }
    return;
  }
  if (state === 'gameover' && gameOverTimer > 60) {
    state = 'select';
    return;
  }
  // running / result 中はジャンプ
  doJump();
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state === 'ranking') { state = 'title'; return; }
    if (state === 'title') { state = 'select'; return; }
    if (state === 'select') {
      // スペース = 決定
      startGame();
      return;
    }
    if (state === 'gameover' && gameOverTimer > 60) { state = 'select'; return; }
    doJump();
  } else if (state === 'select' && (e.code === 'ArrowLeft' || e.code === 'ArrowRight')) {
    e.preventDefault();
    const idx = CHARACTERS.findIndex(c => c.id === selectedCharacter);
    const next = e.code === 'ArrowRight'
      ? (idx + 1) % CHARACTERS.length
      : (idx - 1 + CHARACTERS.length) % CHARACTERS.length;
    selectedCharacter = CHARACTERS[next].id;
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  handlePointer(x, y);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    handlePointer(x, y);
  }
}, { passive: false });

// --- Physics helpers ---
// プラットフォームとの衝突＋地面との衝突を行う物理ステップ
function stepPhysics(groundY) {
  if (!isOnGround) {
    const prevY = charY;
    charVY += GRAVITY;
    charY += charVY;

    // プラットフォーム着地判定（落下中のみ）
    if (charVY > 0 && currentPlatform) {
      const onX = worldX >= currentPlatform.x1 && worldX <= currentPlatform.x2;
      const crossed = prevY <= currentPlatform.topY && charY >= currentPlatform.topY;
      if (onX && crossed) {
        charY = currentPlatform.topY;
        charVY = 0;
        isOnGround = true;
        onPlatform = true;
      }
    }

    // 地面との衝突（プラットフォーム未着地時のみ有効）
    if (!isOnGround && charY >= groundY) {
      charY = groundY;
      charVY = 0;
      isOnGround = true;
      onPlatform = false;
    }
  } else if (onPlatform && currentPlatform) {
    // プラットフォーム上: 端を越える or プラットフォーム切り替え時に落下開始
    if (worldX < currentPlatform.x1 || worldX > currentPlatform.x2) {
      isOnGround = false;
      onPlatform = false;
    } else {
      // 位置を上面に固定
      charY = currentPlatform.topY;
    }
  }
}

// 進化後、分岐直前で自動スローを判定し適用後のスピードを返す
function getAppliedScrollSpeed() {
  let s = scrollSpeed;
  if (evolved && question && !judged) {
    const dist = branchWorldX - worldX;
    if (dist > 0 && dist < SLOW_TRIGGER_DIST) {
      s *= 0.5;
    }
  }
  return s;
}

// --- Main Loop ---
function update() {
  animTimer++;
  const groundY = canvas.height * GROUND_RATIO;

  if (state === 'running') {
    const s = getAppliedScrollSpeed();
    worldX += s;
    bgOffset += s;
    groundOffset += s;
    runFrame += 0.25;

    // Character physics - always active
    stepPhysics(groundY);

    // Check turbo item collision (must be jumping - item is high up)
    if (turboItemActive && !turboItemCollected) {
      const itemScreenX = worldToScreen(turboItemWorldX);
      const itemY = groundY - 140 + Math.sin(animTimer * 0.08) * 8;
      const dx = Math.abs(charX - itemScreenX);
      const dy = Math.abs((charY - CHAR_HEIGHT/2) - itemY);
      if (dx < 45 && dy < 45) {
        turboItemCollected = true;
        turboItemActive = false;
        // Permanent level boost +3
        level += 3;
        scrollSpeed = computeSpeed();
        turboEffectTimer = 60;
        turboCount++;
        spawnParticles(charX, charY - CHAR_HEIGHT/2, '#FF00FF', 20);
        playSound('correct');

        // 進化判定
        if (!evolved && turboCount >= EVOLUTION_TURBO_COUNT) {
          evolved = true;
          evolutionTimer = 60;
          spawnParticles(charX, charY - CHAR_HEIGHT/2, '#FFD700', 40);
          spawnParticles(charX, charY - CHAR_HEIGHT/2, '#FFA500', 30);
          playSound('correct');
        }
      }
    }
    if (turboEffectTimer > 0) turboEffectTimer--;
    if (evolutionTimer > 0) evolutionTimer--;

    // Check branch judgment
    checkBranchJudgment();
    if (correctEffectTimer > 0) correctEffectTimer--;
  }

  if (state === 'result') {
    resultTimer++;

    // Keep scrolling slowly
    const s = scrollSpeed * 0.5;
    worldX += s;
    bgOffset += s;
    groundOffset += s;

    // Character physics（プラットフォーム継続対応）
    if (!isFalling) {
      stepPhysics(groundY);
    } else {
      // Falling into pit animation (プラットフォーム判定なし)
      charVY += GRAVITY * 0.5;
      charY += charVY;
    }

    if (correctEffectTimer > 0) correctEffectTimer--;
    if (evolutionTimer > 0) evolutionTimer--;
    if (shakeTimer > 0) shakeTimer--;

    // After delay, transition
    if (resultCorrect && resultTimer > 50) {
      // Next question
      setupNextBranch();
      state = 'running';
    } else if (!resultCorrect && resultTimer > 70) {
      state = 'gameover';
      gameOverTimer = 0;
      // ランキングに保存
      lastRanking = saveToRanking(level, score, selectedCharacter);
      // 今回のスコアがランキングの何位か判定
      lastRankIndex = lastRanking.findIndex(r => r.level === level && r.score === score);
    }
  }

  if (state === 'gameover') {
    gameOverTimer++;
  }

  updateParticles();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    ctx.save(); ctx.translate(shakeX, shakeY);
  }

  if (state === 'title') {
    drawTitle();
  } else if (state === 'ranking') {
    drawRanking();
  } else if (state === 'select') {
    drawSelect();
  } else {
    drawSky();
    drawMountains();
    drawGround();
    drawTurboItem();
    drawBranch();
    drawCharacter(charX, charY, CHAR_WIDTH, CHAR_HEIGHT, runFrame);
    drawQuestion();
    drawSlowEffect();
    drawScore();
    drawTurboEffect();
    drawCorrectEffect();
    drawParticles();
    if (state === 'gameover') drawGameOver();
  }

  if (shakeTimer > 0) ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
